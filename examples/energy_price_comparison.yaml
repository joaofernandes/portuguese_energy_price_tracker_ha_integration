type: sections
title: Price tracker examples
sections:
  - type: grid
    cards:
      - type: custom:apexcharts-card
        header:
          show: true
          title: Live Now + Timeline Prices
          show_states: true
          colorize_states: true
        graph_span: 24h
        span:
          start: day
        now:
          show: true
          label: Now
        experimental:
          color_threshold: true
        series:
          - entity: sensor.coopernico_base_bi_horario_ciclo_semanal_all_prices
            name: Coopernico Bi-Horário Semanal
            type: line
            color: "#2196F3"
            stroke_width: 2
            opacity: 0.8
            float_precision: 3
            show:
              legend_value: true
              in_header: false
            data_generator: |
              return entity.attributes.prices.map((item) => {
                return [new Date(item.datetime).getTime(), item.price_w_vat];
              });
          - entity: sensor.g9_bihorario_semanal_all_prices
            name: G9 Bi-Horário Semanal
            type: line
            color: "#FF9800"
            stroke_width: 2
            opacity: 0.8
            float_precision: 3
            show:
              legend_value: true
              in_header: false
            data_generator: |
              return entity.attributes.prices.map((item) => {
                return [new Date(item.datetime).getTime(), item.price_w_vat];
              });
          - entity: sensor.coopernico_base_bi_horario_ciclo_semanal_current_price_with_vat
            name: Coopernico Now
            type: line
            color: "#2196F3"
            stroke_width: 0
            opacity: 0
            float_precision: 3
            show:
              legend_value: false
              in_header: true
            data_generator: |
              const value = Number(entity.state);
              if (Number.isNaN(value)) return [];
              return [[Date.now(), value]];
          - entity: sensor.g9_bihorario_semanal_current_price_with_vat
            name: G9 Now
            type: line
            color: "#FF9800"
            stroke_width: 0
            opacity: 0
            float_precision: 3
            show:
              legend_value: false
              in_header: true
            data_generator: |
              const value = Number(entity.state);
              if (Number.isNaN(value)) return [];
              return [[Date.now(), value]];
        apex_config:
          chart:
            height: 400
          xaxis:
            type: datetime
            labels:
              datetimeUTC: false
              format: HH:mm
          yaxis:
            decimalsInFloat: 3
            title:
              text: Price (€/kWh)
            labels:
              formatter: |
                EVAL:function(value) {
                  return value.toFixed(3) + ' €';
                }
          tooltip:
            x:
              format: dd/MM HH:mm
            "y":
              formatter: |
                EVAL:function(value) {
                  return value.toFixed(3) + ' €/kWh';
                }
          legend:
            show: true
            position: top
          stroke:
            curve: stepline
          grid:
            show: true
            borderColor: "#e0e0e0"
max_columns: 6
cards: []
dense_section_placement: true
